version: 1
target:
  name: "AISA run loop"
  type: "workflow"

gates:
  smoke:
    required_pass_rate: 1.0
    allow_needs_human: 0

  blocker_failure_modes:
    min_true_positive_rate: 1.0
    max_false_negative_rate: 0.0

  major_failure_modes:
    min_true_positive_rate: 0.95

  clean_examples:
    min_true_negative_rate: 1.0

  abstention:
    max_needs_human_rate: 0.0

  operations:
    max_retry_budget_exceeded_rate: 0.0

promotion_rule:
  require_test_set: false
  require_blocker_coverage: true
  require_review_packet_schema_stable: true

notes:
  overrides:
    - "Until replay and held-out sets exist, smoke is the release gate for backend runtime changes."
